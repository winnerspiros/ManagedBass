name: Package and Publish

# Triggers:
#   • Push a tag matching v* (e.g. v2024.0425.0) → builds, packages, and publishes to NuGet.org
#   • Publish a GitHub Release                    → same as above
#   • Manual "Run workflow" button (workflow_dispatch) → one-click build + package
#     Set "publish" to true to also push to NuGet.org
on:
  push:
    tags:
      - 'v*'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish:
        description: 'Push packages to NuGet.org after building?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      version_override:
        description: 'Version override (leave blank to auto-generate from date+run)'
        required: false
        default: ''

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── 1. Build & test ──────────────────────────────────────────────────────
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore
        working-directory: src

      - name: Build (Release)
        run: dotnet build -c Release --no-restore -warnaserror
        working-directory: src

      - name: Test
        run: dotnet test -c Release --no-build
        working-directory: src

  # ─── 2. Pack ──────────────────────────────────────────────────────────────
  package:
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # ── Determine package version ─────────────────────────────────────────
      # Priority:  1. manual override   2. git tag   3. date + run number
      - name: Compute version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version_override }}" ]]; then
            VER="${{ github.event.inputs.version_override }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VER="${{ github.ref_name }}"
            VER="${VER#v}"           # strip leading 'v'
          else
            # Auto-name: YYYY.mmdd.<run_number>  (e.g. 2024.0425.7)
            DATE=$(date -u +"%Y.%m%d")
            VER="${DATE}.${{ github.run_number }}"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "📦 Package version: $VER"

      - name: Restore
        run: dotnet restore
        working-directory: src

      - name: Build (Release, versioned)
        run: dotnet build -c Release --no-restore -warnaserror -p:Version=${{ steps.version.outputs.version }}
        working-directory: src

      - name: Pack
        run: dotnet pack -c Release --no-build -p:PackageVersion=${{ steps.version.outputs.version }} -o "${{ github.workspace }}/packages"
        working-directory: src

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.version }}
          path: ${{ github.workspace }}/packages/*.nupkg
          retention-days: 30

  # ─── 3. Publish to NuGet.org ──────────────────────────────────────────────
  publish:
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Push when: a Release was published, a version tag was pushed, or the
    # manual trigger was run with publish=true
    if: |
      github.event_name == 'release' ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event.inputs.publish == 'true'

    steps:
      - name: Download packages artifact
        uses: actions/download-artifact@v4.1.3
        with:
          name: nuget-packages-${{ needs.package.outputs.version }}
          path: packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "packages/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate \
            --api-key ${{ secrets.NUGET_KEY }}

